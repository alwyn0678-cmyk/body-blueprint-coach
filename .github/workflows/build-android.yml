name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:capacitor
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: npx cap sync android
      - run: chmod +x android/gradlew
      - run: cd android && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: Evolved-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master'
        with:
          tag_name: build-${{ github.run_number }}
          name: Evolved v${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: "Download app-debug.apk and install on your Android phone. Enable 'Install unknown apps' in Android settings first."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
